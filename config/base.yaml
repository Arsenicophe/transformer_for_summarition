model:
  embedding_dim: 256
  vocab_size: 50265          # taille vocab du tokenizer (t5-small / barthez)
  n_heads: 8                 # 256 / 8 = 32 dim par head
  n_layer: 4
  max_seq_encoding: 512
  dropout: 0.1

tokenizer:
  pretrained_model_name: "moussaKam/barthez"   # BERT-like français

dataset:
  path: "mlsum"
  name: "fr"
  split: "train"

optimizer:
  lr: 1.0e-4
  weight_decay: 0.01

scheduler:
  warmup_steps: 200
  total_steps: 5000

data:
  batch_size: 8              # T4 15GB — ajuster selon OOM
  max_src_len: 512
  max_tgt_len: 128

training:
  n_epochs: 10
  clip: 1.0
  checkpoint_dir: "checkpoints"
  checkpoint_freq: 1         # sauvegarder tous les N epochs
  device: "cuda"
  mixed_precision: true
  gradient_accumulation_steps: 4   # batch effectif = 8 × 4 = 32